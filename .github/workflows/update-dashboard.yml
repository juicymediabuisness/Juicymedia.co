name: Update Dashboard from Gmail

on:
  schedule:
    - cron: '0 6 * * *'   # runs daily at 6:00 AM UTC
  workflow_dispatch:        # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-auth google-auth-oauthlib google-api-python-client

      - name: Fetch business emails
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
        run: python scripts/fetch_emails.py

      - name: Commit updated data.json
        run: |
          git config user.name "dashboard-bot"
          git config user.email "actions@github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update dashboard data $(date -u +%Y-%m-%d)"
          git push
